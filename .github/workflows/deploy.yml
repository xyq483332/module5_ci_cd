name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_to_staging:
        description: 'Deploy to staging environment'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: |
          docker build -t module5-ci:latest .

      - name: Login to Docker Registry
        if: inputs.deploy_to_staging && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Push and Deploy
        if: inputs.deploy_to_staging && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        run: |
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          docker tag module5-ci:latest ${{ secrets.DOCKER_USERNAME }}/module5:staging-$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/module5:staging-$IMAGE_TAG
          echo "Deployed: ${{ secrets.DOCKER_USERNAME }}/module5:staging-$IMAGE_TAG"

      - name: Notify PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Module 5 CI/CD pipeline completed successfully!'
            })
